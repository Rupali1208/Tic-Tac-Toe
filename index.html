<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Tic Tac Toe</title>


    <style>

        * {
            box-sizing: border-box;
        }


        body {

            margin: 0;

            font-family: Arial, sans-serif;

            background-color: lightblue;

            text-align: center;
        }


        h1 {

            margin-top: 40px;

            color: black;
        }


        .game-container {

            width: 400px;

            max-width: 90%;

            margin: 30px auto;

            padding: 25px;

            background-color: white;

            border-radius: 15px;
        }


        .mode-buttons {

            margin-bottom: 20px;
        }


        button {

            padding: 10px 20px;

            margin: 5px;

            border: none;

            border-radius: 8px;

            cursor: pointer;

            font-size: 16px;
        }


        .board {

            display: grid;

            grid-template-columns:
                repeat(3, 1fr);

            gap: 5px;

            margin: 20px auto;
        }


        .cell {

            width: 100px;

            height: 100px;

            font-size: 40px;

            font-weight: bold;

            background-color: lightgray;
        }


        .cell:hover {

            background-color: gray;
        }


        #message {

            font-size: 20px;

            font-weight: bold;

            margin: 20px;
        }

    </style>

</head>


<body>


    <div class="game-container">


        <h1>TIC TAC TOE</h1>


        <div class="mode-buttons">


            <button onclick="startGame(1)">

                Player VS Player

            </button>


            <button onclick="startGame(2)">

                Player VS Computer

            </button>


        </div>


        <div class="board">


            <button
                class="cell"
                id="cell1"
                onclick="makeMove(1)">
                1
            </button>


            <button
                class="cell"
                id="cell2"
                onclick="makeMove(2)">
                2
            </button>


            <button
                class="cell"
                id="cell3"
                onclick="makeMove(3)">
                3
            </button>


            <button
                class="cell"
                id="cell4"
                onclick="makeMove(4)">
                4
            </button>


            <button
                class="cell"
                id="cell5"
                onclick="makeMove(5)">
                5
            </button>


            <button
                class="cell"
                id="cell6"
                onclick="makeMove(6)">
                6
            </button>


            <button
                class="cell"
                id="cell7"
                onclick="makeMove(7)">
                7
            </button>


            <button
                class="cell"
                id="cell8"
                onclick="makeMove(8)">
                8
            </button>


            <button
                class="cell"
                id="cell9"
                onclick="makeMove(9)">
                9
            </button>


        </div>


        <div id="message">

            Select a game mode

        </div>


        <button onclick="resetGame()">

            Reset Game

        </button>


    </div>


    <script>


        let gameStarted = false;

        let gameOver = false;


        async function startGame(mode) {


            const response = await fetch(
                "/api/start",
                {

                    method: "POST",

                    headers: {

                        "Content-Type":
                            "application/json"

                    },

                    body: JSON.stringify({

                        mode: mode

                    })

                }
            );


            const data =
                await response.json();


            updateBoard(data.board);


            gameStarted = true;

            gameOver = false;


            document.getElementById(
                "message"
            ).innerText = data.message;


        }


        async function makeMove(position) {


            if (!gameStarted) {


                document.getElementById(
                    "message"
                ).innerText =
                    "Please select a game mode first.";


                return;

            }


            if (gameOver) {

                return;

            }


            const response = await fetch(
                "/api/move",
                {

                    method: "POST",

                    headers: {

                        "Content-Type":
                            "application/json"

                    },

                    body: JSON.stringify({

                        position: position

                    })

                }
            );


            const data =
                await response.json();


            if (data.error) {


                document.getElementById(
                    "message"
                ).innerText =
                    data.error;


                return;

            }


            updateBoard(data.board);


            document.getElementById(
                "message"
            ).innerText =
                data.message;


            if (data.game_over) {

                gameOver = true;

            }

        }


        async function resetGame() {


            const response = await fetch(
                "/api/reset",
                {

                    method: "POST"

                }
            );


            const data =
                await response.json();


            updateBoard(data.board);


            gameStarted = false;

            gameOver = false;


            document.getElementById(
                "message"
            ).innerText =
                "Game reset. Select a game mode.";

        }


        function updateBoard(board) {


            for (
                let i = 0;
                i < 9;
                i++
            ) {


                document.getElementById(
                    "cell" + (i + 1)
                ).innerText =
                    board[i];

            }

        }


    </script>


</body>

</html>
